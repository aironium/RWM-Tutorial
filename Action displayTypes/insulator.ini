
[core]
#autoTriggerCooldownTime: 0.5s
name: action_displayType_tut
displayText: Action Display Type sample
tags: wall
class: CustomUnitMetadata
price: 0
maxHp: 2000
mass: 9000
techLevel: 1
buildSpeed: 2s
radius: 15
isBio: false
isBuilding: true
#softCollisionOnAll: 5
footprint: 0,0,0,0

[graphics]
total_frames: 1
image: insulator.png
image_wreak: NONE
image_shadow: AUTO
shadowOffsetX:0
shadowOffsetY:2
drawLayer: ground

[attack]
