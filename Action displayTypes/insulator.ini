canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
turretSize: 10
turretTurnSpeed: 0
maxAttackRange: 100
shootDelay: 0

[movement]
movementType: NONE
moveSpeed: 0
moveAccelerationSpeed: 0
moveDecelerationSpeed: 0

maxTurnSpeed: 0
turnAcceleration: 0


[template_actions]
text: ${type}
displayType: ${type}
price: 0
allowMultipleInQueue: false
addResources: hp = 1
buildSpeed: 0s

[action_label]
text: Display
displayType: infoOnly
price: 0
allowMultipleInQueue: false
addResources: hp = 1
buildSpeed: 0s


[action_label2]
text: Types
displayType: infoOnly
price: 0
allowMultipleInQueue: false
addResources: hp = 1
buildSpeed: 0s

[action_blank1]
