[core]
class: CustomUnitMetadata
price: 1200
maxHp: 220
mass: 3000

techLevel: 1
buildSpeed: 8s
#availableInDemo: true
radius: 13
displayRadius: 14

isBio: false
softCollisionOnAll: 0



energyMax: 100
maxShield: 250
shieldRegen: 0

energyRegen: 0 

[graphics]
total_frames: 2

image:        carbonB.png
image_wreak:ded.png
image_turret: carbonT.png

image_shadow: AUTO
shadowOffsetX:1
shadowOffsetY:1


animation_moving_start: 0
animation_moving_end: 1
animation_moving_speed: 1


dustEffect: true

[attack]
canAttack: true
canAttackFlyingUnits: false
canAttackLandUnits:   true
canAttackUnderwaterUnits: false

turretSize: 29
turretTurnSpeed: 4


maxAttackRange: 100
shootDelay: 30

[turret_1]
#
x: 0
y: 0
projectile: 1
turnSpeedAcceleration: 1.0
shoot_sound:tank_firing
shoot_sound_vol:0.5
shoot_flame:small
shoot_light:#FFEECCCC
canShoot: true
energyUsage: 1
resourceUsage: hp=-5
canAttackCondition: if self.hp(lessThan=200)
invisible: if not self.hp(lessThan=200)

[turret_2]
#
x: 0
y: 0
projectile: 1
turnSpeedAcceleration: 1.0
shoot_sound:tank_firing
shoot_sound_vol:0.5
shoot_flame:small
shoot_light:#FFEECCCC
canShoot: true
energyUsage: 1
canAttackCondition: if self.hp(greaterThan=200)
invisible: if not self.hp(greaterThan=200)



[projectile_1]
directDamage: 4
life: 60
speed: 3
frame: 1
drawSize: 0.85
buildingDamageMultiplier: 0.55
turnSpeed: 0


[movement]
movementType: HOVER
moveSpeed: 1.45
