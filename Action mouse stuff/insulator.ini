setUnitMemory: guiBuildUnitCoord = thisActionTarget

[action_guiBuildUnitData]
text: x: %{memory.guiBuildUnitCoord.x}, y: %{memory.guiBuildUnitCoord.y}, 
displayType: infoOnly
price: 0
allowMultipleInQueue: false
addResources: hp = 1
buildSpeed: 1s

[core]
