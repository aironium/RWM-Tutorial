shootDelay: 0

[movement]
movementType: NONE
moveSpeed: 0
moveAccelerationSpeed: 0
moveDecelerationSpeed: 0

maxTurnSpeed: 0
turnAcceleration: 0


[template_actions]
text: ${type}
displayType: ${type}
price: 0
allowMultipleInQueue: false
addResources: hp = 1
buildSpeed: 0s

[action_label]
text: Method
displayType: infoOnly
price: 0
allowMultipleInQueue: false
addResources: hp = 1
buildSpeed: 0s


[action_label2]
text: Data
displayType: infoOnly
price: 0
allowMultipleInQueue: false
addResources: hp = 1
buildSpeed: 0s

[action_guiBuildUnit]
text: guiBuildUnit
price: 0
allowMultipleInQueue: false
buildSpeed: 1s
